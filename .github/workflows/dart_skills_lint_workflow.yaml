name: dart_skills_lint
permissions: read-all

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'tool/dart_skills_lint/**'
      - '.github/workflows/dart_skills_lint_workflow.yaml'
  push:
    branches: [ main ]
    paths:
      - 'skills/**'
      - 'tool/dart_skills_lint/**'
      - '.github/workflows/dart_skills_lint_workflow.yaml'
  schedule:
    - cron: '0 0 * * 0' # weekly
  workflow_dispatch:

defaults:
  run:
    working-directory: tool/dart_skills_lint

jobs:
  analyze_and_test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - run: dart analyze --fatal-infos

      - name: Run cyclomatic complexity check
        run: dart run dart_code_linter:metrics analyze lib

      - run: dart test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - name: Collect coverage
        run: dart test --coverage=coverage

      - name: Format coverage to LCOV
        run: dart run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib

      # Action steps do not inherit defaults.run.working-directory, so this
      # path is relative to the repository root.
      - name: Enforce coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: tool/dart_skills_lint/coverage/lcov.info
          min_coverage: 73
          exclude: '**/*.g.dart'

  validate_skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - name: Validate skills
        run: dart run dart_skills_lint:cli

  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - run: dart format --output=none --set-exit-if-changed .

  pana_score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - name: Install pana
        run: dart pub global activate pana

      - name: Run pana and gate on granted points >= 150
        # pana exits 0 even on score regressions, so parse grantedPoints
        # out of the JSON report and fail the job ourselves. The floor is
        # 150 today; raise it as the package adds new metadata wins.
        run: |
          set -euo pipefail
          mkdir -p build
          dart pub global run pana --no-warning --json . > build/pana.json
          GRANTED=$(jq -r '.scores.grantedPoints' build/pana.json)
          MAX=$(jq -r '.scores.maxPoints' build/pana.json)
          echo "pana score: ${GRANTED}/${MAX}"
          if [ "${GRANTED}" -lt 150 ]; then
            echo "::error::pana score ${GRANTED} is below the floor of 150."
            echo "Full report:"
            jq '.' build/pana.json
            exit 1
          fi

      - name: Upload pana report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pana-report
          path: tool/dart_skills_lint/build/pana.json
          if-no-files-found: ignore

  publish_dry_run:
    # Manual-only rehearsal of the v1.0.0 publish flow. Gated on
    # workflow_dispatch so it never runs on routine pushes or PRs —
    # the publish dry-run is noisy and useful only when a maintainer
    # is actively staging a release.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - run: dart pub publish --dry-run
