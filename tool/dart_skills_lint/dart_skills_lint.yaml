dart_skills_lint:
  rules:
    check-relative-paths: error
    check-absolute-paths: error
  directories:
    - path: ".agents/skills"
      rules:
        check-trailing-whitespace: error
      ignore_file: ".agents/skills/ignore.json"
    - path: "../../skills"
      ignore_file: ".agents/skills/flutter_skills_ignore.json"
    - path: "skills"
      rules:
        check-trailing-whitespace: error
        prevent-skills-sh-publishing: error
    - path: "example/invalid"
      rules:
        prevent-skills-sh-publishing: error
    - path: "example/valid"
      rules:
        prevent-skills-sh-publishing: error
  individual_skills:
    - path: ".agents/skills/add-dart-lint-validation-rule"
      rules:
        prevent-skills-sh-publishing: error
    - path: ".agents/skills/check-downstream-consumers"
      rules:
        prevent-skills-sh-publishing: error
    - path: ".agents/skills/dart-skills-lint-integration"
      rules:
        prevent-skills-sh-publishing: error
    - path: ".agents/skills/definition-of-done"
      rules:
        prevent-skills-sh-publishing: error

